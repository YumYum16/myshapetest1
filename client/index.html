<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>MyShape — Trouvez les lunettes faites pour votre visage</title>
    <meta name="description" content="MyShape utilise l'IA pour analyser votre morphologie faciale et vous recommander les montures de lunettes parfaites. Essayage en réalité augmentée, 100% local, aucune photo stockée." />
    <meta name="keywords" content="lunettes, morphologie visage, essayage virtuel, IA, recommandation lunettes, optique en ligne" />
    <meta property="og:title" content="MyShape — Trouvez les lunettes faites pour votre visage" />
    <meta property="og:description" content="Analyse IA de morphologie faciale + recommandations personnalisées de lunettes. Essayage AR en temps réel." />
    <meta property="og:type" content="website" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;1,400;1,600&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Umami Analytics (optionnel - charge seulement si les env vars sont définies) -->
    <script type="module">
      if (import.meta.env.VITE_ANALYTICS_ENDPOINT && import.meta.env.VITE_ANALYTICS_WEBSITE_ID) {
        const script = document.createElement('script');
        script.defer = true;
        script.src = import.meta.env.VITE_ANALYTICS_ENDPOINT + '/umami';
        script.setAttribute('data-website-id', import.meta.env.VITE_ANALYTICS_WEBSITE_ID);
        document.head.appendChild(script);
      }
    </script>
  </body>
</html>
